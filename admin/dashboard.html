<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - Os Centenários</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .admin-nav {
            background: #222;
            padding: 15px 0;
            color: #fff;
        }
        .admin-nav .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .admin-tabs {
            margin: 30px 0;
            border-bottom: 2px solid #ddd;
        }
        .tab-btn {
            padding: 10px 20px;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 1.1rem;
            font-weight: bold;
        }
        .tab-btn.active {
            color: var(--vermelho);
            border-bottom: 3px solid var(--vermelho);
        }
        .tab-content {
            display: none;
            padding: 20px 0;
        }
        .tab-content.active {
            display: block;
        }
        .table-admin {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .table-admin th, .table-admin td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        .table-admin th {
            background: #f9f9f9;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .form-full {
            grid-column: 1 / -1;
        }
        .image-preview {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .image-preview-item {
            width: 80px;
            height: 80px;
            position: relative;
            border: 1px solid #ddd;
        }
        .image-preview-item img {
            width: 100%; height: 100%; object-fit: cover;
        }
        .btn-delete-img {
            position: absolute;
            top: -5px; right: -5px;
            background: red; color: white;
            border: none; border-radius: 50%;
            width: 20px; height: 20px;
            font-size: 12px; cursor: pointer;
        }
        .image-notice {
            background: #fff3cd;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
            font-size: 0.9rem;
            color: #856404;
        }
    </style>
</head>
<body style="background: #fdfdfd;">
    <nav class="admin-nav">
        <div class="container">
            <h3>PAINEL ADMIN</h3>
            <div>
                <span id="user-email"></span>
                <button onclick="logout()" class="btn" style="padding: 5px 15px; font-size: 0.8rem; margin-left: 10px;">Sair</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="admin-tabs">
            <button class="tab-btn active" data-tab="products">Produtos</button>
            <button class="tab-btn" data-tab="cms">Conteúdo Site</button>
        </div>

        <!-- Products Tab -->
        <div id="products" class="tab-content active">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2>Gerenciar Produtos</h2>
                <button onclick="openProductModal()" class="btn">Novo Produto</button>
            </div>
            
            <table class="table-admin">
                <thead>
                    <tr>
                        <th>Imagem</th>
                        <th>Nome</th>
                        <th>Preço</th>
                        <th>Estoque</th>
                        <th>Categoria</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="product-list-body">
                    <!-- Loaded via JS -->
                </tbody>
            </table>
        </div>

        <!-- CMS Tab -->
        <div id="cms" class="tab-content">
            <h2>Conteúdo do Site</h2>
            <div id="cms-list" style="margin-top: 20px;">
                <!-- Loaded via JS -->
            </div>
        </div>
    </div>

    <!-- Product Modal -->
    <div id="product-modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title">Novo Produto</h2>
            <div class="image-notice">
                <i class="fas fa-info-circle"></i> As imagens devem seguir proporção 1:1 para melhor encaixe no layout. Recomendado: 1000x1000px.
            </div>
            <form id="product-form">
                <input type="hidden" id="product-id">
                <div class="form-grid">
                    <div class="form-full">
                        <label>Nome</label>
                        <input type="text" id="prod-name" required style="width:100%; padding:8px;">
                    </div>
                    <div class="form-full">
                        <label>Descrição</label>
                        <textarea id="prod-desc" style="width:100%; padding:8px; height:80px;"></textarea>
                    </div>
                    <div>
                        <label>Preço (R$)</label>
                        <input type="number" step="0.01" id="prod-price" required style="width:100%; padding:8px;">
                    </div>
                    <div>
                        <label>Estoque</label>
                        <input type="number" id="prod-stock" required style="width:100%; padding:8px;">
                    </div>
                    <div>
                        <label>Categoria</label>
                        <select id="prod-category" style="width:100%; padding:8px;">
                            <option value="Camisas">Camisas</option>
                            <option value="Acessórios">Acessórios</option>
                            <option value="Decoração">Decoração</option>
                            <option value="Bandeiras">Bandeiras</option>
                        </select>
                    </div>
                    <div>
                        <label>Status</label>
                        <select id="prod-status" style="width:100%; padding:8px;">
                            <option value="active">Ativo</option>
                            <option value="inactive">Inativo</option>
                        </select>
                    </div>
                    <div class="form-full">
                        <label>Ocultar se esgotado?</label>
                        <input type="checkbox" id="prod-hide-out">
                    </div>
                    <div class="form-full">
                        <label>Imagens</label>
                        <input type="file" id="prod-images" multiple accept="image/*" onchange="validateAndPreviewImages(this)">
                        <div id="preview-container" class="image-preview"></div>
                    </div>
                </div>
                <div style="margin-top: 20px; display: flex; justify-content: flex-end; gap: 10px;">
                    <button type="button" onclick="closeProductModal()" class="btn" style="background: #ccc;">Cancelar</button>
                    <button type="submit" class="btn">Salvar Produto</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
