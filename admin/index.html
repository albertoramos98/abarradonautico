<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Os Centenários</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --vermelho: #e30613;
            --branco: #ffffff;
            --cinza-escuro: #333333;
            --cinza-claro: #f5f5f5;
            --vermelho-hover: #c40510;
        }

        body {
            background-color: var(--vermelho);
            background-image: linear-gradient(rgba(227, 6, 19, 0.85), rgba(227, 6, 19, 0.85)), url('../images/12anos.jpg');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Helvetica, Arial, sans-serif;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            background: var(--branco);
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
        }

        .login-container .logo {
            color: var(--vermelho);
            font-size: 2rem;
            margin-bottom: 10px;
            display: block;
            font-family: 'Ultras Liberi', sans-serif;
        }

        .login-container h2 {
            color: var(--cinza-escuro);
            margin-bottom: 30px;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: var(--cinza-escuro);
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--vermelho);
        }

        .btn-login {
            width: 100%;
            background-color: var(--vermelho);
            color: var(--branco);
            border: none;
            padding: 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            font-family: 'Ultras Liberi', sans-serif;
            text-transform: uppercase;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-login:hover {
            background-color: var(--vermelho-hover);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(227, 6, 19, 0.3);
        }

        #error-msg {
            color: var(--vermelho);
            background: #fff5f5;
            padding: 10px;
            border-radius: 4px;
            margin-top: 20px;
            font-size: 0.9rem;
            display: none;
            border: 1px solid #ffebeb;
        }

        .back-to-site {
            margin-top: 25px;
            display: block;
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .back-to-site:hover {
            color: var(--vermelho);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <a href="/" class="logo">Os Centenários</a>
        <h2>Painel Administrativo</h2>
        
        <form id="login-form">
            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com" required>
            </div>
            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Senha</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login">Entrar no Painel</button>
            <p id="error-msg">Credenciais inválidas ou sem permissão.</p>
        </form>

        <a href="/" class="back-to-site"><i class="fas fa-arrow-left"></i> Voltar para o site</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            const { data, error } = await window.supabaseClient.auth.signInWithPassword({
                email,
                password
            });

            if (error) {
                errorMsg.textContent = error.message;
                errorMsg.style.display = 'block';
                return;
            }

            // Check if user has admin role in metadata
            const user = data.user;
            if (user.user_metadata.role !== 'admin') {
                await window.supabaseClient.auth.signOut();
                errorMsg.textContent = 'Acesso negado. Apenas administradores.';
                errorMsg.style.display = 'block';
                return;
            }

            window.location.href = '/admin/dashboard.html';
        });

        // Check if already logged in
        window.supabaseClient.auth.getSession().then(({ data: { session } }) => {
            if (session && session.user.user_metadata.role === 'admin') {
                window.location.href = '/admin/dashboard.html';
            }
        });
    </script>
</body>
</html>
